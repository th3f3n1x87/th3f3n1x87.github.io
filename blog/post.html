            content: `# Kubernetes per SysAdmin: da Zero a Cluster

Se sei un sistemista con esperienza su Linux e vuoi capire Kubernetes **senza il solito marketing**, sei nel posto giusto.

---

## Cos'è Kubernetes (davvero)?

Kubernetes (K8s) è un **orchestratore di container**: gestisce il ciclo di vita, la scalabilità e la disponibilità dei tuoi container in modo completamente automatico.

> _"Descrivi lo stato che vuoi, Kubernetes ci pensa a mantenerlo."_

La differenza con Docker standalone è enorme: con K8s non gestisci i container **uno ad uno**, ma gestisci il **desired state** del tuo sistema intero.

---

## Architettura Core

Un cluster Kubernetes è composto da:

### Control Plane (ex Master)
| Componente | Ruolo |
|---|---|
| \`api-server\` | Punto de entrata per ogni comando \`kubectl\` |
| \`etcd\` | Database distribuito: la "memoria" del cluster |
| \`scheduler\` | Decide su quale nodo girare nuovi pod |
| \`controller-manager\` | Mantiene lo stato desiderato (es. replica pod crashati) |

### Worker Nodes
| Componente | Ruolo |
|---|---|
| \`kubelet\` | Agente su ogni nodo, riceve ordini dall'API server |
| \`kube-proxy\` | Gestisce il networking dei pod |
| Container Runtime | Docker, containerd, CRI-O |

---

## Il Pod: l'Unità Base

Non esiste il concetto di "container" in K8s. L'unità minima è il **Pod**: uno o più container che condividono rete e storage.

\`\`\`yaml
apiVersion: v1
kind: Pod
metadata:
  name: nginx-test
  labels:
    app: nginx
spec:
  containers:
  - name: nginx
    image: nginx:latest
    ports:
    - containerPort: 80
\`\`\`

Crea il pod:
\`\`\`bash
kubectl apply -f pod.yaml
kubectl get pods
kubectl describe pod nginx-test
\`\`\`

---

## Deployment: Pod con Superpoderi

Non crei mai pod direttamente in produzione. Usi un **Deployment** che gestisce repliche, rolling update e rollback.

\`\`\`yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
\`\`\`

---

## Tips da Produzione

1. **Imposta sempre i \`resource limits\`**: senza, un pod può consumare tutta la RAM del nodo.
2. **Usa \`namespaces\`** per separare ambienti (dev, staging, prod) sullo stesso cluster.
3. **Non usare \`latest\` come tag**: specifica sempre la versione esatta dell'immagine.
4. **\`kubectl rollout undo deployment/nome\`** per rollback immediato.
5. **Liveness e Readiness Probe**: insegnano a K8s quando un pod è davvero sano.
`

            content: `# Ansible: Automazione dell'Infrastruttura senza Segreti

Ho smesso di fare modifiche manuali sui server il giorno in cui ho perso tre ore a debuggare una configurazione "temporanea" che era live da 6 mesi. La soluzione si chiama **Ansible**.

---

## Perché Ansible e non gli altri?

| Tool | Agentless | Linguaggio | Learning Curve |
|---|---|---|---|
| **Ansible** | ✅ Sì | YAML + Jinja2 | Bassa |
| Puppet | ❌ No | Ruby DSL | Alta |
| Chef | ❌ No | Ruby | Alta |
| Terraform | ✅ Sì | HCL | Media |

Ansible è **agentless**: si connette via SSH ai tuoi server senza richiedere agent installati.

---

## Concetti Fondamentali

### Inventory

\`\`\`ini
[webservers]
web01.example.com
web02.example.com

[dbservers]
db01.example.com ansible_user=postgres
\`\`\`

### Playbook

\`\`\`yaml
---
- name: Setup Web Server
  hosts: webservers
  become: yes

  tasks:
    - name: Installa Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Avvia e abilita Nginx
      systemd:
        name: nginx
        state: started
        enabled: yes
  handlers:
    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded
\`\`\`

---

## Ansible Vault

\`\`\`bash
ansible-vault create group_vars/all/secrets.yml
ansible-vault edit group_vars/all/secrets.yml
ansible-playbook site.yml --ask-vault-pass
\`\`\`

---

1. **\`--check\` mode**: esegui in dry-run senza cambiare nulla.
2. **\`--diff\`**: mostra cosa cambierebbe nei file.
3. **Tag i task**: \`ansible-playbook site.yml --tags "nginx"\`.
4. **\`ansible-lint\`**: usa sempre il linter.
5. **Idempotenza**: scrivi task che girano N volte senza effetti collaterali.
`

Prima di capire Docker, mi chiedevo sempre: _"Ma non bastano le VM?"_. Risposta: dipende. Ma i container hanno rivoluzionato la distribuzione del software per buoni motivi.

---

## Container vs VM: la differenza pratica

| | VM | Container |
|---|---|---|
| Overhead | Alto (OS completo) | Basso (condivide kernel) |
| Boot time | Minuti | Secondi |
| Dimensione | GB | MB |
| Isolamento | Completo | A livello di processo |

---

## Installazione e Primo Container

\`\`\`bash
curl -fsSL https://get.docker.com | sh
sudo usermod -aG docker $USER
docker run hello-world
docker run -d -p 80:80 --name web nginx
\`\`\`

---

## Il Dockerfile

\`\`\`dockerfile
FROM debian:bookworm-slim
RUN apt-get update && apt-get install -y python3 --no-install-recommends
WORKDIR /app
COPY requirements.txt .
RUN pip3 install -r requirements.txt
COPY . .
RUN useradd -m appuser && chown -R appuser /app
USER appuser
EXPOSE 8000
CMD ["python3", "app.py"]
\`\`\`

---

## Docker Compose

\`\`\`yaml
version: '3.8'
services:
  db:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
volumes:
  pgdata:
\`\`\`

---

## Tips di Sicurezza

1. **Mai root nel container**: usa \`USER nonroot\`.
2. **Immagini base slim**: superficie di attacco ridotta.
3. **Scan immagini**: \`docker scout cves myimage:tag\`.
4. **Secrets**: mai variabili d'ambiente per le password.
5. **Read-only filesystem**: \`docker run --read-only ...\`.
`

\`iptables\` ha fatto il suo tempo. Su tutte le distro moderne il default è **nftables**.

---

## Perché Passare a nftables?

| Caratteristica | iptables | nftables |
|---|---|---|
| Tabelle separate | ✅ Sì (confuso) | ❌ No, tutto unificato |
| Syntax | Verbosa | Compatta |
| Transazione atomica | ❌ No | ✅ Sì |

---

## Ruleset Base per un Server

\`\`\`nft
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;
        iifname lo accept
        ct state established,related accept
        ip protocol icmp accept
        tcp dport 22 ip saddr 192.168.1.0/24 accept
        tcp dport { 80, 443 } accept
        log prefix "[nftables DROP] " drop
    }
    chain forward { type filter hook forward priority 0; policy drop; }
    chain output  { type filter hook output priority 0; policy accept; }
}
\`\`\`

\`\`\`bash
nft -f /etc/nftables.conf   # Applica
nft -c -f /etc/nftables.conf # Verifica sintassi
\`\`\`

---

## Maps: Blocklist Dinamica

\`\`\`nft
set blocklist {
    type ipv4_addr
    flags interval
    elements = { 192.168.99.0/24 }
}
chain input { ip saddr @blocklist drop }
\`\`\`

\`\`\`bash
nft add element inet filter blocklist { 1.2.3.4 }
\`\`\`

---

## Tips per la Produzione

1. **Sempre \`flush ruleset\` all'inizio**: stato pulito e deterministico.
2. **Testa prima di applicare**: \`nft -c -f file.nft\`.
3. **Usa \`ct state established,related accept\`** o bloccherai il traffico di ritorno.
4. **Versiona con Git**: un errore di firewall blocca l'SSH.
`

    function generateTOC(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const headings = doc.querySelectorAll('h2, h3');
        const tocList = document.getElementById('toc-list');
        tocList.innerHTML = '';
        if(headings.length === 0) {
            tocList.innerHTML = '<li><span style="color:var(--text-dim);font-size:0.8rem">No headings found</span></li>';
            return html;
        }
        headings.forEach(h => {
            const id = h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-');
            const li = document.createElement('li');
            li.style.paddingLeft = h.tagName === 'H3' ? '12px' : '0';
            li.innerHTML = `<a href="#${id}">${h.textContent}</a>`;
            tocList.appendChild(li);
        });
        return html.replace(/<h([23])>(.*?)<\/h([23])>/g, (match, level, text) => {
            const id = text.toLowerCase().replace(/[^a-z0-9]+/g, '-');
            return `<h${level} id="${id}">${text}</h${level}>`;
        });
    }

    }

    // Share actions
    document.getElementById('copy-link-btn').addEventListener('click', () => {
        navigator.clipboard.writeText(window.location.href)
            .then(() => showToast('✓ Link copiato negli appunti!'));
    });
    document.getElementById('share-linkedin').addEventListener('click', () => {
        window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}`, '_blank');
    });
    document.getElementById('share-twitter').addEventListener('click', () => {
        window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(document.getElementById('page-title').textContent)}`, '_blank');
    });

    // Uptime
    let s = 5*24*3600 + 10*3600 + 25*60;
    setInterval(() => {
        s++;
        const d = Math.floor(s/86400), h = Math.floor(s%86400/3600), m = Math.floor(s%3600/60), sec = s%60;
        document.getElementById('uptime').textContent = `${d}d ${h}h ${m}m ${sec}s`;
    }, 1000);

    // Mobile nav
    const toggle = document.querySelector('.menu-toggle');
    const nav = document.querySelector('.nav-links');
    toggle.addEventListener('click', () => {
        nav.classList.toggle('active');
        toggle.querySelector('i').classList.toggle('fa-bars');
        toggle.querySelector('i').classList.toggle('fa-times');
    });

    // Navbar scroll
    window.addEventListener('scroll', () => {
        document.querySelector('.navbar').classList.toggle('scrolled', window.scrollY > 50);
    });

    loadPost();
    </script>

</body>
</html>
