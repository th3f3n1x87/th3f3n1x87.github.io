<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Valerio Simeraro Blog - Articoli su DevOps, SysAdmin, Linux e Cloud">
    <title>Blog | Valerio Simeraro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">

    <style>
        /* Blog-specific overrides */
        .blog-hero {
            min-height: 35vh;
            padding-top: 130px;
            padding-bottom: 40px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .blog-controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .search-wrapper {
            position: relative;
        }

        #search-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-glass);
            padding: 14px 20px 14px 50px;
            border-radius: 8px;
            color: var(--text-main);
            font-family: var(--font-code);
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
        }

        #search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 17px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 1rem;
        }

        .search-results-count {
            position: absolute;
            right: 17px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-family: var(--font-code);
            font-size: 0.8rem;
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .tag-cloud-label {
            font-family: var(--font-code);
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-right: 5px;
        }

        .tag-btn {
            font-family: var(--font-code);
            font-size: 0.75rem;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-glass);
            background: rgba(0,0,0,0.3);
            color: var(--text-dim);
            cursor: pointer;
            transition: var(--transition);
        }

        .tag-btn:hover, .tag-btn.active {
            background: rgba(0, 255, 204, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .tag-btn[data-tag="all"].active {
            background: rgba(0, 255, 204, 0.15);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Post Cards Grid */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        .post-card {
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: var(--transition);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
            background: var(--accent);
            transform: scaleY(0);
            transform-origin: bottom;
            transition: transform 0.4s ease;
        }

        .post-card:hover::before { transform: scaleY(1); }

        .post-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 255, 204, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 5px 0 20px rgba(0, 255, 204, 0.1);
        }

        .post-card-date {
            font-family: var(--font-code);
            font-size: 0.78rem;
            color: var(--accent-secondary);
        }

        .post-card-title {
            font-family: var(--font-heading);
            font-size: 1.15rem;
            color: var(--text-main);
            line-height: 1.4;
        }

        .post-card-excerpt {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.6;
            flex-grow: 1;
        }

        .post-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .post-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .post-tag {
            font-family: var(--font-code);
            font-size: 0.72rem;
            padding: 3px 9px;
            border-radius: 12px;
            background: rgba(0, 255, 204, 0.08);
            border: 1px solid rgba(0, 255, 204, 0.2);
            color: var(--accent);
        }

        .post-card-read {
            font-family: var(--font-code);
            font-size: 0.78rem;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
            font-family: var(--font-code);
        }

        .no-results i { font-size: 3rem; margin-bottom: 20px; display: block; }

        @media (max-width: 768px) {
            .posts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient-1"></div>
    <div class="bg-gradient-2"></div>

    <nav class="navbar glass-effect">
        <div class="logo">
            <a href="../index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 5px;">
                <span class="logo-bracket"><</span>
                <span class="logo-text">V.Simeraro</span>
                <span class="logo-bracket">/></span>
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="../index.html#home">~Home</a></li>
            <li><a href="../index.html#skills">~Skills</a></li>
            <li><a href="../index.html#experience">~Experience</a></li>
            <li><a href="index.html" class="active">~Blog</a></li>
            <li><a href="../index.html#contact">~Contact</a></li>
        </ul>
        <div class="menu-toggle"><i class="fas fa-bars"></i></div>
    </nav>

    <main>
        <div class="section blog-hero">
            <h1 class="section-title fade-in-up" style="text-align:left; margin-bottom: 10px;">
                Tech <span class="accent">Blog</span>
            </h1>
            <p class="text-dim fade-in-up">Appunti, guide e deep dive su DevOps, Linux, Cloud e sicurezza.</p>
        </div>

        <div class="section" style="padding-top: 0; min-height: auto;">
            <div class="blog-controls">
                <div class="search-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search-input" placeholder="grep -r 'argomento' ./blog" autocomplete="off">
                    <span class="search-results-count" id="results-count"></span>
                </div>
                <div class="tag-cloud" id="tag-cloud">
                    <span class="tag-cloud-label">$ filter --tag</span>
                </div>
            </div>

            <div class="posts-grid" id="posts-grid">
                <!-- Rendered by JS -->
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content glass-effect">
            <p>&copy; 2024 Valerio Simeraro. System running optimally.</p>
            <div class="uptime-counter">Uptime: <span id="uptime">0d 0h 0m</span></div>
        </div>
    </footer>

    <script>
    // Manifest dati incorporato direttamente per compatibilità file:// e GitHub Pages
    const POSTS_MANIFEST = [
        {
            "slug": "kubernetes-per-sysadmin",
            "title": "Kubernetes per SysAdmin: da Zero a Cluster",
            "date": "2026-03-10",
            "author": "Valerio Simeraro",
            "tags": ["kubernetes", "devops", "containers", "linux"],
            "excerpt": "Una guida pratica per i sistemisti che vogliono capire Kubernetes davvero, senza marketing. Dalle architetture ai pod, fino alla gestione di un cluster in produzione."
        },
        {
            "slug": "ansible-automazione-infrastruttura",
            "title": "Ansible: Automazione dell'Infrastruttura senza Segreti",
            "date": "2026-02-28",
            "author": "Valerio Simeraro",
            "tags": ["ansible", "automation", "devops", "iac"],
            "excerpt": "Come ho smesso di fare modifiche manuali e ho iniziato ad automatizzare tutto con Ansible: playbook, ruoli, vault e tips da produzione."
        },
        {
            "slug": "docker-per-sysadmin",
            "title": "Docker per SysAdmin: La Guida che Avrei Voluto",
            "date": "2026-02-10",
            "author": "Valerio Simeraro",
            "tags": ["docker", "containers", "linux", "devops"],
            "excerpt": "Dal perché usare Docker fino alle reti e ai volumi: tutto quello che serve a un sistemista per padroneggiare i container nel mondo reale."
        },
        {
            "slug": "firewall-linux-nftables",
            "title": "Firewall su Linux nel 2024: nftables è il Futuro",
            "date": "2026-01-20",
            "author": "Valerio Simeraro",
            "tags": ["linux", "networking", "security", "firewall"],
            "excerpt": "iptables è legacy. nftables è il suo successore ufficiale su Linux. Scopriamo come migrare e sfruttare tutta la potenza del nuovo framework."
        }
    ];

    let allPosts = [];
    let activeTag = 'all';

    function readingTime(words) {
        const wpm = 200;
        const mins = Math.ceil(words / wpm);
        return `~${mins} min read`;
    }

    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('it-IT', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function renderPosts(posts) {
        const grid = document.getElementById('posts-grid');
        const count = document.getElementById('results-count');
        count.textContent = `${posts.length} article${posts.length !== 1 ? 's' : ''}`;

        if(posts.length === 0) {
            grid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i>Nessun articolo trovato.</div>`;
            return;
        }

        grid.innerHTML = posts.map(p => `
            <a href="post.html?slug=${p.slug}" class="post-card glass-effect">
                <div class="post-card-date">[ ${formatDate(p.date)} ]</div>
                <div class="post-card-title">${p.title}</div>
                <div class="post-card-excerpt">${p.excerpt}</div>
                <div class="post-card-meta">
                    <div class="post-card-tags">
                        ${p.tags.map(t => `<span class="post-tag">#${t}</span>`).join('')}
                    </div>
                </div>
            </a>
        `).join('');
    }

    function applyFilters() {
        const query = document.getElementById('search-input').value.toLowerCase().trim();
        let filtered = allPosts;
        if(activeTag !== 'all') {
            filtered = filtered.filter(p => p.tags.includes(activeTag));
        }
        if(query) {
            filtered = filtered.filter(p =>
                p.title.toLowerCase().includes(query) ||
                p.excerpt.toLowerCase().includes(query) ||
                p.tags.some(t => t.toLowerCase().includes(query))
            );
        }
        renderPosts(filtered);
    }

    function buildTagCloud(posts) {
        const tagSet = new Set();
        posts.forEach(p => p.tags.forEach(t => tagSet.add(t)));
        const cloud = document.getElementById('tag-cloud');

        const allBtn = document.createElement('button');
        allBtn.className = 'tag-btn active';
        allBtn.dataset.tag = 'all';
        allBtn.textContent = 'all';
        cloud.appendChild(allBtn);

        [...tagSet].sort().forEach(tag => {
            const btn = document.createElement('button');
            btn.className = 'tag-btn';
            btn.dataset.tag = tag;
            btn.textContent = `#${tag}`;
            cloud.appendChild(btn);
        });

        cloud.addEventListener('click', e => {
            if(!e.target.classList.contains('tag-btn')) return;
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            activeTag = e.target.dataset.tag;
            applyFilters();
        });
    }

    function init() {
        allPosts = POSTS_MANIFEST;
        buildTagCloud(allPosts);
        renderPosts(allPosts);

        document.getElementById('search-input').addEventListener('input', applyFilters);

        // Uptime counter
        let s = 5*24*3600 + 10*3600 + 25*60;
        setInterval(() => {
            s++;
            const d = Math.floor(s/86400), h = Math.floor(s%86400/3600), m = Math.floor(s%3600/60), sec = s%60;
            document.getElementById('uptime').textContent = `${d}d ${h}h ${m}m ${sec}s`;
        }, 1000);

        // Scroll animations
        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in-up').forEach(el => obs.observe(el));

        // Mobile nav
        const toggle = document.querySelector('.menu-toggle');
        const nav = document.querySelector('.nav-links');
        toggle.addEventListener('click', () => {
            nav.classList.toggle('active');
            toggle.querySelector('i').classList.toggle('fa-bars');
            toggle.querySelector('i').classList.toggle('fa-times');
        });

        // Navbar scroll
        window.addEventListener('scroll', () => {
            document.querySelector('.navbar').classList.toggle('scrolled', window.scrollY > 50);
        });
    }

    init();
    </script>

</body>
</html>
